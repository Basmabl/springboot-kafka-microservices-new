# ═══════════════════════════════════════════
# MySQL — Order Service (port 3307)
# ═══════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-order
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-order
  template:
    metadata:
      labels:
        app: mysql-order
    spec:
      nodeSelector:
        tier: infrastructure
      containers:
        - name: mysql-order
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: order_db
          volumeMounts:
            - name: mysql-order-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: mysql-order-data
          persistentVolumeClaim:
            claimName: mysql-order-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-order-service
  namespace: microservices
spec:
  selector:
    app: mysql-order
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-order-pvc
  namespace: microservices
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

