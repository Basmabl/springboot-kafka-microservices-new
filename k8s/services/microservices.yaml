# ══════════════════════════════════════
# Identity Service
# ══════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: springboot-kafka-microservices/identity-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9898
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-identity-service:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mysql-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-broker:9092
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_INSTANCE_HOSTNAME
              value: identity-service
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: microservices
spec:
  selector:
    app: identity-service
  ports:
    - port: 9898
      targetPort: 9898
  type: ClusterIP
---
