# ══════════════════════════════════════
# Email Service
# ══════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: springboot-kafka-microservices/email-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-broker:9092
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-host
            - name: SPRING_MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-port
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-password
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
              value: "true"
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
              value: "true"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: email-service
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
  namespace: microservices
spec:
  selector:
    app: email-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP