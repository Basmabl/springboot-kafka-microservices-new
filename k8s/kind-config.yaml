apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: microservices-cluster
nodes:
  # ─── Nœud Control Plane (cerveau du cluster) ───
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80        # HTTP  → localhost:80
        protocol: TCP
      - containerPort: 443
        hostPort: 443       # HTTPS → localhost:443
        protocol: TCP
      - containerPort: 9191
        hostPort: 9191      # API Gateway direct
        protocol: TCP
      - containerPort: 8761
        hostPort: 8761      # Eureka Dashboard
        protocol: TCP
      - containerPort: 3000
        hostPort: 3000      # Frontend React
        protocol: TCP

  # ─── Nœuds Workers (font tourner les apps) ───
  - role: worker
    labels:
      tier: infrastructure  # Pour Kafka, MySQL, Redis
  - role: worker
    labels:
      tier: backend         # Pour les microservices Spring Boot
  - role: worker
    labels:
      tier: frontend        # Pour le frontend React